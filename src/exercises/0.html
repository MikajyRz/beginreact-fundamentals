<!doctype html>
<html lang="en">
  <head>
    {{> head}}
  </head>
  <body class="">
    {{> header-bar }}

    <div class="flex flex-col gap-4 container">
      <input id="base" placeholder="Entrer la base">
      <input id="hauteur" placeholder="Entrer la hauteur">
      <button class="btn btn-primary" onclick="calculate()">Submit</button>
      <div id="result"></div>
    </div>
  </body>

  <script>
    const triangleAir = (base, height) => (base * height) / 2;

    const calculate = () => {
      const base = Number(document.querySelector('#base').value);
      const hauteur = Number(document.querySelector('#hauteur').value);

      if (Number.isNaN(base) || Number.isNaN(hauteur)) {
        alert('Type de donnees incorrect');
        return;
      }

      const result = triangleAir(base, hauteur);
      document.querySelector('#result').innerHTML = result;
    };
  </script>

  <script></script>
</html>
